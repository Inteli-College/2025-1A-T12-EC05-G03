name: Deploy Docusaurus Site

on:
  push:
    branches:
      - feat/Alteracoes-Necessarias-para-deploy-da-documentacao-Docusaurus

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: docs
        run: npm install

      - name: Build Docusaurus site
        working-directory: docs
        run: npm run build

      - name: Copy build to github folder
        run: |
          mkdir -p github
          rm -rf github/*
          cp -R docs/build/* github/
          touch github/.nojekyll

      - name: Deploy to GitHub Pages
        env:
          USE_SSH: true
        run: |
          cd github
          git init
          git config user.name "ianpsa"
          git config user.email "ian.simao@sou.inteli.br"
          git remote add origin git@github.com:Inteli-College/2025-1A-T12-EC05-G03.git
          git checkout -b gh-pages
          git add --all
          git commit -m "Deploy site"
          git push --force origin gh-pages
