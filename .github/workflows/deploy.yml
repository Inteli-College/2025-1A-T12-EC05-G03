name: Deploy Docusaurus Site

on:
  push:
    branches:
      - feat/Alteracoes-Necessarias-para-deploy-da-documentacao-Docusaurus

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: docs
        run: npm install

      - name: Build Docusaurus site
        working-directory: docs
        run: npm run build

      - name: Configure Git for deploy
        working-directory: docs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_USER: ${{ github.actor }}
        run: |
          git config --global user.email "seu-email@exemplo.com"
          git config --global user.name "Seu Nome"
          # Substitui qualquer URL que comece com "https://github.com/" por uma que inclui usuário e token
          git config --global url."https://${GIT_USER}:${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Deploy Docusaurus site
        working-directory: docs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_USER: ${{ github.actor }}
          GIT_EMAIL: ${{ github.actor }}@users.noreply.github.com
        run: npm run deploy
