name: Deploy Docusaurus Site

on:
  push:
    branches: [main]  # ou a branch de deploy

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'  # ou a versão que seu projeto usa

      - name: Install dependencies
        run: yarn install

      - name: Build Docusaurus site
        run: yarn build

      - name: Copy build to github folder
        run: |
          rm -rf github/*
          cp -R build/* github/
          # Adiciona o .nojekyll para desabilitar o processamento do Jekyll
          touch github/.nojekyll

      - name: Deploy to GitHub Pages
        env:
          USE_SSH: true
        run: |
          cd github
          git init
          git remote add origin git@github.com:Inteli-College/2025-1A-T12-EC05-G03.git
          git checkout -b gh-pages
          git add --all
          git commit -m "Deploy site"
          git push --force origin gh-pages
